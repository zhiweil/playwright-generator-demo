name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ACCESSNOW_HOST: ${{ vars.ACCESSNOW_HOST }}
      AUTH_HOST: ${{ vars.AUTH_HOST }}
      TEST_USERNAME: ${{ vars.TEST_USERNAME }}
      TEST_USER_PASSWORD: ${{ vars.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install
      - run: npx playwright install --with-deps
      - run: playwright test --project=chromium --reporter=html --output=playwright-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
